[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
  ; WebSocket client
  links2004/WebSockets @ ^2.4.0
  ; mDNS / Bonjour for finding display without fixed IP
  ; (ESP32 Arduino SDK has ESPmDNS built-in)

monitor_speed = 115200

build_flags =
  -DCORE_DEBUG_LEVEL=0

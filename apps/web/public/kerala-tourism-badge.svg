<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" fill="none">
  <!-- Badge background -->
  <rect width="200" height="70" rx="6" fill="#004D29"/>

  <!-- Boat on water (backwater boat / kettuvallam silhouette) -->
  <path d="M18 45 Q28 52 48 52 Q68 52 78 45" stroke="#D4A017" stroke-width="2" fill="#D4A017" fill-opacity="0.15"/>
  <!-- Boat hull -->
  <path d="M22 48 Q48 58 74 48" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Boat canopy/roof -->
  <path d="M28 48 Q36 38 48 36 Q60 38 68 48" stroke="#D4A017" stroke-width="1.5" fill="#D4A017" fill-opacity="0.3" stroke-linejoin="round"/>
  <!-- Pole -->
  <line x1="48" y1="36" x2="48" y2="28" stroke="#D4A017" stroke-width="1.5"/>
  <!-- Water ripples -->
  <path d="M14 52 Q22 56 30 52" stroke="#CCF0D9" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M66 52 Q74 56 82 52" stroke="#CCF0D9" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Kerala text -->
  <text x="90" y="30" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#D4A017" letter-spacing="1">KERALA</text>
  <text x="90" y="46" font-family="Georgia, serif" font-size="13" font-weight="600" fill="#FFFFFF" letter-spacing="1">TOURISM</text>

  <!-- Divider line -->
  <line x1="90" y1="51" x2="188" y2="51" stroke="#D4A017" stroke-width="0.75" opacity="0.6"/>

  <!-- God's Own Country tagline -->
  <text x="90" y="63" font-family="Georgia, serif" font-size="9" fill="#CCF0D9" letter-spacing="0.5" font-style="italic">God's Own Country</text>
</svg>
